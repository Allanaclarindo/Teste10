<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bella Flor | Moda Feminina</title>

    <link rel="stylesheet" href="style.css">

    <!-- Ícones -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<header>

    <h1>Bella Flor</h1>
    <p>Moda Feminina</p>

</header>

<section id="produtos">

    <h2>Catálogo</h2>

    <!-- BUSCA -->

    <div class="busca">

        <input
            type="text"
            id="buscar"
            placeholder="🔍 Buscar produtos..."
            onkeyup="buscarProdutos()">

    </div>

    <!-- FILTROS -->

    <div class="filtros">

        <button onclick="filtrarCategoria('Todos')">Todos</button>

        <button onclick="filtrarCategoria('Vestidos')">Vestidos</button>

        <button onclick="filtrarCategoria('Conjuntos')">Conjuntos</button>

        <button onclick="filtrarCategoria('Tops')">Tops</button>

        <button onclick="filtrarCategoria('Shorts')">Shorts</button>

        <button onclick="filtrarCategoria('Blusas')">Blusas</button>

        <button onclick="filtrarCategoria('Macaquinhos')">Macaquinhos</button>

        <button onclick="filtrarCategoria('Jaquetas')">Jaquetas</button>

    </div>

    <div class="produtos" id="lista-produtos"></div>

</section>

<!-- MODAL -->

<div id="modal" class="modal">

    <div class="modal-conteudo">

        <h3 id="modal-nome"></h3>

        <div id="modal-imagens"></div>

        <button onclick="fecharModal()">

            Fechar

        </button>

    </div>

</div>

<!-- MODAL IMAGEM -->

<div id="modal-imagem-full">

    <img id="img-full">

    <div id="miniaturas"></div>

    <button onclick="fecharImagemFull()">

        ✕

    </button>

  </div>
  <!-- BOTÃO DO CARRINHO -->

<div id="carrinho-btn" onclick="abrirCarrinho()">
    <i class="fa-solid fa-cart-shopping"></i>
    <span id="contador">0</span>
</div>

<!-- CARRINHO LATERAL -->

<div id="carrinho-lateral" class="carrinho">

    <div class="topo-carrinho">

        <h2>
            <i class="fa-solid fa-cart-shopping"></i>
            Carrinho
        </h2>

        <button class="fechar-carrinho" onclick="fecharCarrinho()">
            ✕
        </button>

    </div>

    <div id="itens-carrinho"></div>

    <p id="total"></p>

    <button class="btn-whatsapp" onclick="enviarCarrinhoWhatsApp()">

        <i class="fa-brands fa-whatsapp"></i>

        Finalizar compra

    </button>

</div>

<!-- BOTÃO FLUTUANTE -->

<div id="whatsapp-btn" onclick="enviarCarrinhoWhatsApp()">

    <i class="fa-brands fa-whatsapp"></i>

</div>

<script src="script.js"></script>

</body>

</html>
